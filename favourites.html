<!DOCTYPE html>
<html>
    
    <header>
           
        <div style="text-align: center;background-color: orange;">
            <h1>Favourites</h1>
        </div>

    </header>


    <body>
           <div id="favouritequotessaved" style="margin-top: 20px;">
                <p style="margin-top: 20px;"></p>
           </div>
    </body>


    <script>
        const favs = JSON.parse(localStorage.getItem('favourites'));
        console.log(favs)
        favs.forEach(element => {
           const p = document.createElement('p')
           p.innerText = element
           document.getElementById('favouritequotessaved').appendChild(p)
            
        });

    </script>

</html>
