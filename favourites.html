<!DOCTYPE html>
<html>
    
    <header>
           
        <div style="text-align: center;background-color: orange;">
            <h1>Favourites</h1>
        </div>

    </header>


    <body>

        
            

           <div id="favouritequotessaved" style="margin-top: 20px; position: relative;">
                <p style="margin-top: 20px;position: relative;"></p>
           </div>

    

      
    </body>


    <script>
        const favs = JSON.parse(localStorage.getItem('favourites'));
        console.log(favs)
        favs.forEach(element => {
           const p = document.createElement('p')
           const deletebutton = document.createElement('button')
           p.innerText = element
           document.getElementById('favouritequotessaved').appendChild(p)
           document.getElementById('favouritequotessaved').appendChild(deletebutton)

           deletebutton.addEventListener('click', function(){

              const index = favs.indexOf(element)
              deletebutton.innerText = 'Delete'
              favs.splice(index, 1)
              localStorage.setItem('favourites', JSON.stringify(favs))
              location.reload()

              deletebutton.style.backgroundColor = 'red'
              deletebutton.style.color = 'white'
              deletebutton.style.color = 'white'
              deletebutton.style.cursor = 'pointer'
              deletebutton.style.borderRadius = '5px'
              deletebutton.style.padding = '5px 10px'



           }
        
        )
           
            
        });

    </script>

</html>
